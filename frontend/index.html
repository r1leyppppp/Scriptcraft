<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>ScriptCraft · AI 小说转剧本</title>
</head>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Microsoft YaHei', sans-serif;
    background: #edede8;
    color: #333;
  }

header {
  background: #7194c6;
  padding: 16px 24px;
  border-bottom: 1px solid #3606e4;
}

header h1 {
  font-size: 20px;
  font-weight: 600;
  color: #ffffff;
}

header p {
  font-size: 13px;
  color: #07264f;
  margin-top: 2px;
}

  main {
    display: flex;
    height: calc(100vh - 57px);
  }

  #input-panel, #output-panel {
    flex: 1;
    padding: 20px;
    background: #ffffff;
    border-right: 1px solid #e0e0e0;
    min-width: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  h2 {
  font-size: 20px;
  font-weight: 700;
  color: #1f2937;
  margin-bottom: 16px;
  letter-spacing: 0.05em;
}

  textarea {
    flex: 1;
    width: 100%;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 12px;
    font-size: 14px;
    font-family: 'Microsoft YaHei', sans-serif;
    resize: none;
    outline: none;
    line-height: 1.7;
  }

textarea:focus {
  border-color: #6366f1;
}

#convert-btn {
  padding: 8px 20px;
  background: #ffffff;
  color: #1f2937;
  border: 1.5px solid #1f2937;
  border-radius: 20px;
  font-size: 13px;
  font-family: 'Microsoft YaHei', sans-serif;
  cursor: pointer;
  font-weight: 600;
  letter-spacing: 0.08em;
  transition: all 0.2s;
}

#convert-btn:hover {
  background: #1f2937;
  color: #ffffff;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
#output-content {
  flex: 1;
  width: 100%;
  height: calc(100% - 40px);
  border: 1px solid #e0e0e0;
  border-radius: 6px;
  padding: 12px;
  font-size: 13px;
  font-family: 'Courier New', monospace;
  background: #f8f9fa;
  color: #333;
  overflow: auto;
  white-space: pre-wrap;
  line-height: 1.7;
}

#copy-btn{
  padding: 8px 20px;
  background: #ffffff;
  color: #1f2937;
  border: 1.5px solid #1f2937;
  border-radius: 20px;
  font-size: 13px;
  font-family: 'Microsoft YaHei', sans-serif;
  cursor: pointer;
  font-weight: 600;
  letter-spacing: 0.08em;
  transition: all 0.2s;
}

#copy-btn:hover {
  background: #1f2937;
  color: #ffffff;
}

#convert-btn {
  padding: 8px 20px;
  background: #ffffff;
  color: #1f2937;
  border: 1.5px solid #1f2937;
  border-radius: 20px;
  font-size: 13px;
  font-family: 'Microsoft YaHei', sans-serif;
  cursor: pointer;
  font-weight: 600;
  letter-spacing: 0.08em;
  transition: all 0.2s;
}

#convert-btn:hover {
  background: #1f2937;
  color: #ffffff;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
</style>
<body>

  <header>
  <div>
    <h1>ScriptCraft</h1>
    <p>AI 小说转剧本工具</p>
  </header>

  <main>
    <div id="input-panel">
      <div class="panel-header">
        <h2>小说输入</h2>
        <button id="convert-btn">开始转换</button>
      </div>
      <textarea id="novel-input" placeholder="在这里粘贴小说原文..."></textarea>
    </div>
    
    <textarea id="novel-input" placeholder="在这里粘贴小说原文..."></textarea>
  </div>
    <div id="output-panel">
      <div class="panel-header">
        <h2>剧本输出</h2>
        <button id="copy-btn">复制</button>
      </div>
      <pre id="output-content">转换结果将显示在这里...</pre>
    </div>
  </main>

</body>
</html>
