<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>ScriptCraft · AI 小说转剧本</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
  <div>
    <h1>ScriptCraft</h1>
    <p>AI 小说转剧本工具</p>
  </header>

  <main>
    <div id="input-panel">
      <div class="panel-header">
        <h2>小说输入</h2>
        <button id="convert-btn">开始转换</button>
      </div>
      <textarea id="novel-input" placeholder="在这里粘贴小说原文..."></textarea>
    </div>
    
    <textarea id="novel-input" placeholder="在这里粘贴小说原文..."></textarea>
  </div>
    <div id="output-panel">
      <div class="panel-header">
        <h2>剧本输出</h2>
        <button id="copy-btn">复制</button>
      </div>
      <pre id="output-content">转换结果将显示在这里...</pre>
    </div>
  </main>

  <div class="modal-overlay" id="modal">
    <div class="modal-box">
      <p id="modal-msg">提示</p>
      <button class="modal-confirm" onclick="closeModal()">确认</button>
    </div>
  </div>
<script src="script.js"></script>
</body>
</html>
