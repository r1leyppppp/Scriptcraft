<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scriptcraft</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="welcome-page" class="page active">
    <div class="welcome-container">
      <h1>✍️ Scriptcraft</h1>
      <p>AI 驱动的小说转剧本工具</p>
      <div class="choose-btns">
        <button class="choose-btn" onclick="goTo('text')">
          <span class="btn-icon">📝</span>
          <span class="btn-title">文字输入</span>
          <span class="btn-desc">直接粘贴小说文本</span>
        </button>
        <button class="choose-btn" onclick="goTo('file')">
          <span class="btn-icon">📂</span>
          <span class="btn-title">文件上传</span>
          <span class="btn-desc">上传 .txt 文件</span>
        </button>
      </div>
    </div>
  </div> 
  <div id="text-page" class="page">
    <button class="back-btn" onclick="goTo('welcome')">← 返回</button>
    <header>
      <h1>ScriptCraft</h1>
      <p>AI 小说转剧本工具</p>
    </header>
    <main>
      <div id="input-panel">
        <div class="panel-header">
          <h2>小说输入</h2>
          <button id="convert-btn">开始转换</button>
        </div>
        <textarea id="novel-input" placeholder="在这里粘贴小说原文..."></textarea>
      </div>
      <div id="output-panel">
        <div class="panel-header">
          <h2>剧本输出</h2>
          <button id="copy-btn">复制</button>
        </div>
        <pre id="output-content">转换结果将显示在这里...</pre>
      </div>
    </main>
    <div class="modal-overlay" id="modal">
      <div class="modal-box">
        <p id="modal-msg">提示</p>
        <button class="modal-confirm" onclick="closeModal()">确认</button>
      </div>
    </div>
  </div>
    <div id="file-page" class="page">
    <button class="back-btn" onclick="goTo('welcome')">← 返回</button>
    <header>
      <h1>ScriptCraft</h1>
      <p>AI 小说转剧本工具</p>
    </header>
    <main>
      <div id="file-input-panel">
        <div class="panel-header">
          <h2>文件上传</h2>
          <button id="file-convert-btn">开始转换</button>
        </div>
        <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
          <p>📂 点击上传 .txt 文件</p>
          <span>支持 UTF-8 编码的纯文本文件</span>
          <input type="file" id="file-input" accept=".txt" onchange="handleFile(event)">
        </div>
        <p id="file-name">未选择文件</p>
      </div>

      <div id="file-output-panel">
        <div class="panel-header">
          <h2>剧本输出</h2>
          <button id="file-copy-btn">复制</button>
        </div>
        <pre id="file-output-content">转换结果将显示在这里...</pre>
      </div>
    </main>
  </div>

<script src="script.js"></script>
</body>
</html>
