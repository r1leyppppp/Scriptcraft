<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>ScriptCraft · AI 小说转剧本</title>
</head>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Microsoft YaHei', sans-serif;
    background: #edede8;
    color: #333;
  }

header {
  background: #7194c6;
  padding: 16px 24px;
  border-bottom: 1px solid #3606e4;
}

header h1 {
  font-size: 20px;
  font-weight: 600;
  color: #ffffff;
}

header p {
  font-size: 13px;
  color: #07264f;
  margin-top: 2px;
}

  main {
    display: flex;
    height: calc(100vh - 57px);
  }

  #input-panel, #output-panel {
    flex: 1;
    padding: 20px;
    background: #ffffff;
    border-right: 1px solid #e0e0e0;
  }

  h2 {
    font-size: 14px;
    font-weight: 600;
    color: #555;
    margin-bottom: 12px;
  }
</style>
<body>

  <header>
    <h1>ScriptCraft</h1>
    <p>AI 小说转剧本工具</p>
  </header>

  <main>
    <div id="input-panel">
      <h2>小说输入</h2>
    </div>

    <div id="output-panel">
      <h2>剧本输出</h2>
    </div>
  </main>

</body>
</html>
